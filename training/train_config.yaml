# Training configuration for intent classifier fine-tuning.
# Adjust per vertical as needed.

# DeBERTa-v3-xsmall: 22M params, p99 ~35ms on CPU (PyTorch).
# With ONNX INT8, expect p99 < 20ms — well within 50ms budget.
# DeBERTa-v3-base (86M) had p99 > 100ms on CPU — too slow.
base_model: microsoft/deberta-v3-xsmall
max_length: 128
batch_size: 8
learning_rate: 2.0e-5
epochs: 3
warmup_ratio: 0.1
weight_decay: 0.01
label_smoothing: 0.05
eval_split: 0.15

# Freeze the word embedding layer to prevent overfitting.
freeze_embeddings: true
